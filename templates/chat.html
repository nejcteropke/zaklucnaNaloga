<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
}

.chat-container{
    width:600px;
    margin:auto;
}

.messages{
    height:400px;
    overflow-y:auto;
    border:1px solid #444;
    padding:10px;
    margin-bottom:20px;
}

.message{
    margin-bottom:10px;
}

.message b{
    color:#2ecc71;
}

form{
    display:flex;
}

input{
    flex:1;
    padding:10px;
    border:none;
}

button{
    padding:10px 20px;
    background:#2ecc71;
    border:none;
    color:white;
}

.back-btn{
    display:inline-block;
    margin:20px;
    padding:10px 20px;
    background:#2ecc71;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

.back-btn:hover{
    background:#27ae60;
}

</style>

</head>

<body>
    <a href="{{ url_for('home') }}" class="back-btn">← Back</a>

<div class="chat-container">

<h2>Chat</h2>

<div class="messages">

{% for message in messages %}

<div class="message">
<b>{{ message.user }}</b>: {{ message.text }}
</div>

{% endfor %}

</div>

<form method="POST">

<input type="text" name="message" placeholder="Write message..." required>

<button type="submit">Send</button>

</form>

</div>

</body>

</html>
