<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with {{ recipient }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #121212;
            color: #ffffff;
            overflow: hidden;
        }

        .chat-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #121212;
        }

        .chat-header {
            background: #121212;
            border-bottom: 1px solid #222222;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            padding: 8px 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: #2ecc71;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        .recipient-info {
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        .recipient-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
            color: #2ecc71;
        }

        .recipient-status {
            font-size: 12px;
            color: #888888;
        }

        .header-icons {
            display: flex;
            gap: 16px;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1a1a1a;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #2ecc71;
            transition: all 0.2s ease;
        }

        .header-icon:hover {
            background: #222222;
            transform: scale(1.05);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scroll-behavior: smooth;
            background: #121212;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #b0b0b0;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
            animation: fadeInUp 0.3s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
            animation: bubbleScale 0.3s ease-out;
        }

        @keyframes bubbleScale {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .message.sent .bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .message.received .bubble {
            background: #1a1a1a;
            color: #ffffff;
        }

        .timestamp {
            font-size: 12px;
            color: #888888;
            margin-top: 2px;
            display: flex;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .message:hover .timestamp {
            opacity: 1;
        }

        .message-form {
            background: #121212;
            border-top: 1px solid #222222;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #222222;
            border-radius: 20px;
            font-size: 15px;
            outline: none;
            resize: none;
            font-family: inherit;
            transition: all 0.2s ease;
            max-height: 100px;
            background: #1a1a1a;
            color: #ffffff;
        }

        .message-input:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 1px rgba(46, 204, 113, 0.2);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2ecc71;
            border: none;
            color: #121212;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 12px rgba(46, 204, 113, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .extra-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1a1a1a;
            border: none;
            color: #2ecc71;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .extra-btn:hover {
            background: #222222;
            transform: scale(1.05);
        }

        .day-divider {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin: 20px 0;
            position: relative;
        }

        .day-divider::before,
        .day-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: #e5e5e5;
        }

        .day-divider::before {
            left: 0;
        }

        .day-divider::after {
            right: 0;
        }
    </style>
</head>
<body>
    <div class="chat-page">
        <!-- HEADER -->
        <div class="chat-header">
            <div class="header-left">
                <a href="{{ url_for('private_messages') }}" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div class="recipient-info">
                    <div class="recipient-name">{{ recipient }}</div>
                    <div class="recipient-status">Online</div>
                </div>
            </div>
            <div class="header-icons">
                <button class="header-icon" title="Call">
                    <i class="fas fa-phone"></i>
                </button>
                <button class="header-icon" title="Video call">
                    <i class="fas fa-video"></i>
                </button>
                <button class="header-icon" title="Info">
                    <i class="fas fa-info-circle"></i>
                </button>
            </div>
        </div>

        <!-- MESSAGES -->
        <div class="messages-container" id="messagesContainer">
            {% for message in messages %}
                <div class="message {% if message.sender == session.username %}sent{% else %}received{% endif %}">
                    <div class="bubble">
                        {{ message.text }}
                        <div class="timestamp">
                            {{ message.timestamp[11:16] if message.get('timestamp') else '' }}
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>

        <!-- MESSAGE FORM -->
        <form class="message-form" method="POST" id="messageForm">
            <div class="input-wrapper">
                <button type="button" class="extra-btn">
                    <i class="fas fa-plus"></i>
                </button>
                <input 
                    type="text" 
                    name="message" 
                    class="message-input" 
                    placeholder="Aa" 
                    id="messageInput" 
                    required
                    autocomplete="off"
                >
            </div>
            <button type="submit" class="send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const messageForm = document.getElementById('messageForm');

        // Auto scroll to bottom
        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        window.addEventListener('load', scrollToBottom);

        // Auto-grow textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Send message on Enter
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                messageForm.submit();
            }
        });

        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
