<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Group</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0d0d0d, #121212);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: #2ecc71;
            color: #121212;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-btn:hover {
            background: #58d68d;
            transform: translateY(-2px);
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(18, 18, 18, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            backdrop-filter: blur(10px);
            animation: slideUp 0.5s ease-out;
            border: 1px solid #222222;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #2ecc71;
        }

        .subtitle {
            color: #888888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
            animation: fadeInUp 0.4s ease-out backwards;
        }

        .form-group:nth-child(1) {
            animation-delay: 0.1s;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.2s;
        }

        .form-group:nth-child(3) {
            animation-delay: 0.3s;
        }

        .form-group:nth-child(4) {
            animation-delay: 0.4s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2ecc71;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #222222;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            background: #1a1a1a;
            color: #ffffff;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .members-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .members-list {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px;
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 16px;
            border: 1px solid #222222;
        }

        .members-list::-webkit-scrollbar {
            width: 6px;
        }

        .members-list::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        .member-checkbox {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .member-checkbox:hover {
            background: #222222;
        }

        .member-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 12px;
            accent-color: #2ecc71;
        }

        .member-checkbox label {
            flex: 1;
            margin: 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        .member-name {
            font-size: 14px;
            font-weight: 500;
            color: #2ecc71;
        }

        .member-info {
            font-size: 12px;
            color: #888888;
            margin-top: 2px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .create-btn {
            background: #2ecc71;
            color: #121212;
        }

        .create-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .create-btn:active {
            transform: translateY(0);
        }

        .cancel-btn {
            background: #1a1a1a;
            color: #2ecc71;
        }

        .cancel-btn:hover {
            background: #222222;
        }

        .helper-text {
            font-size: 12px;
            color: #888888;
            margin-top: 4px;
        }

        .empty-message {
            text-align: center;
            padding: 24px;
            color: #999;
        }
    </style>
</head>
<body>
    <a href="{{ url_for('groups_list') }}" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <div class="container">
        <h1>Create Group</h1>
        <p class="subtitle">Start a group conversation with friends</p>

        <form method="POST" id="createGroupForm">
            <!-- Group Name -->
            <div class="form-group">
                <label for="groupName">Group Name *</label>
                <input 
                    type="text" 
                    id="groupName" 
                    name="group_name" 
                    placeholder="e.g., Friends, Band, Project Team"
                    required
                >
                <div class="helper-text">Choose a memorable name for your group</div>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="description">Description (Optional)</label>
                <textarea 
                    id="description" 
                    name="description" 
                    placeholder="What is this group about?"
                ></textarea>
            </div>

            <!-- Members Selection -->
            <div class="form-group">
                <div class="members-section">
                    <h3>Add Members</h3>
                    {% if users %}
                        <div class="members-list">
                            {% for user in users %}
                                <div class="member-checkbox">
                                    <input 
                                        type="checkbox" 
                                        id="member_{{ user.username }}" 
                                        name="members" 
                                        value="{{ user.username }}"
                                    >
                                    <label for="member_{{ user.username }}">
                                        <span class="member-name">{{ user.username }}</span>
                                        <span class="member-info">
                                            {% if user.name and user.surname %}
                                                {{ user.name }} {{ user.surname }}
                                            {% else %}
                                                No profile info
                                            {% endif %}
                                        </span>
                                    </label>
                                </div>
                            {% endfor %}
                        </div>
                    {% else %}
                        <div class="empty-message">
                            <i class="fas fa-users" style="font-size: 32px; opacity: 0.3; display: block; margin-bottom: 10px;"></i>
                            <p>No other users available</p>
                        </div>
                    {% endif %}
                    <div class="helper-text">Select people you want to add to this group</div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="buttons">
                <a href="{{ url_for('groups_list') }}" class="cancel-btn">Cancel</a>
                <button type="submit" class="create-btn">
                    <i class="fas fa-plus"></i> Create Group
                </button>
            </div>
        </form>
    </div>

    <script>
        const groupNameInput = document.getElementById('groupName');
        const createBtn = document.querySelector('.create-btn');
        const form = document.getElementById('createGroupForm');

        // Auto-focus group name
        groupNameInput.focus();

        // Form validation
        form.addEventListener('submit', (e) => {
            if (!groupNameInput.value.trim()) {
                e.preventDefault();
                alert('Please enter a group name');
                groupNameInput.focus();
            }
        });

        // Add input animation
        groupNameInput.addEventListener('focus', function() {
            this.parentElement.style.animation = 'none';
            setTimeout(() => {
                this.parentElement.style.animation = '';
            }, 10);
        });
    </script>
</body>
</html>
